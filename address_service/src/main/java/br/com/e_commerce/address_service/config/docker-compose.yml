version: "3.8"

services:
  db:
    image: postgres:15
    container_name: mdp_adress
    restart: always
    environment:
      POSTGRES_DB: adress
      POSTGRES_USER: felipe
      POSTGRES_PASSWORD: 1234
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5433:5432"
    volumes:
      - pgdata_adress:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U felipe"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata_adress:


